<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kanika 💜</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="blackFade"></div>

<!-- LOADER (PAGE 1 - your existing) -->
<div id="loader">
    <p id="loadingText">Loading...</p>

    <div class="loading-bar">
        <div id="progress"></div>
    </div>
</div>

<!-- PAGE 2 - ENVELOPE -->
<div class="page" id="page1">
    <h1>Dear Kanika</h1>
    <img src="envelope.jpeg" id="envelopeImg" class="envelope-img" onclick="openEnvelope()">
<h3>Tap the envelope</h3>
</div>

<!-- PAGE 3 - LETTER -->
<div class="page" id="page2">
    <h1>💌 A Letter For You</h1>
    <p class="letter">Dear Kanika... (your text)</p>
    <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 4 - MEMORIES -->
<div class="page" id="page3">
    <h1>📸 Memories</h1>

    <button onclick="nextPage(2)">Back</button>
    <button onclick="nextPage(4)">Next</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page4">
    <h1>🎂 Surprise Section</h1>

    <button onclick="nextPage(3)">Back</button>
    <button onclick="nextPage(5)">Next</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="page5">
    <h1>💖 Things I Like About You</h1>

    <button onclick="nextPage(4)">Back</button>
    <button onclick="nextPage(6)">Next</button>
</div>

<!-- PAGE 7 -->
<div class="page" id="page6">
    <h1>😂 Funny Memories</h1>

    <button onclick="nextPage(5)">Back</button>
    <button onclick="nextPage(7)">Next</button>
</div>

<!-- PAGE 8 -->
<div class="page" id="page7">
    <h1>🎵 Music & Vibes</h1>

    <button onclick="nextPage(6)">Back</button>
    <button onclick="nextPage(8)">Next</button>
</div>

<!-- PAGE 9 -->
<div class="page" id="page8">
    <h1>🌈 Final Message</h1>

    <button onclick="nextPage(7)">Back</button>
    <button onclick="nextPage(9)">Next</button>
</div>

<!-- PAGE 10 (FINAL REAL PAGE 9 CONTENT) -->
<div class="page" id="page9">
    <h1>💖 Happy Birthday Kanika</h1>

    <p>End message here...</p>

    <button onclick="nextPage(8)">Back</button>
    <button onclick="nextPage(2)">Restart 🔁</button>
</div>

<script src="script.js"></script>

</body>
</html>
