<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kanika 💜</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BLACK OVERLAY -->
<div id="blackFade"></div>

<!-- FLOATING BACKGROUND -->
<div id="floating-container"></div>

<!-- LOADER -->
<div id="loader">
    <h1>🎂</h1>
    <h1>Dear Kanika</h1>
    <p id="loadingText">Loading...</p>

    <div class="loading-bar">
        <div id="progress"></div>
    </div>
</div>

<!-- PAGE 1 -->
<div class="page" id="page1">

    <h1 class="main-title">Happy Birthday<br>💜</h1>

    <h3 class="subtitle">Tap the envelope 💌</h3>

    <div class="envelope-container" onclick="openEnvelope()">
        <img id="envelopeImg" src="envelope.jpeg" class="envelope-img">
    </div>

    <p class="hint">Open your surprise ✨</p>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

    <h1>💌 A Letter For You</h1>

    <p class="letter">
        Dear Kanika,<br><br>
        You are special ✨<br>
        Hope this makes you smile 💜
    </p>

    <div class="buttons">
        <button onclick="nextPage(3)">Next →</button>
    </div>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

    <h1>📸 Memories</h1>

    <p>We’ll add this later 💖</p>

    <div class="buttons">
        <button onclick="nextPage(2)">← Back</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
